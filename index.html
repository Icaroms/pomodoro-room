<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Room</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

    <!-- TELA INICIAL -->
    <div id="start-screen">
        <div id="start-content">
            <div id="start-icon">🍅</div>
            <h1 id="start-title">Pomodoro<br>Room</h1>
            <p id="start-subtitle">Foque. Ganhe. Decore.</p>
            <div id="start-instructions">
                <span>🎮 WASD / Setas / D-pad para mover</span>
                <span>🖱️ Arraste para mover móveis</span>
                <span>🍅 Complete pomodoros e ganhe moedas</span>
                <span>🛋️ Decore seu quarto na loja</span>
            </div>
            <button id="btn-play">Jogar</button>
            <p id="start-version">v1.0</p>
        </div>
    </div>

    <div id="game-container" class="hidden">

        <!-- HEADER -->
        <header id="game-header">
            <h1>Pomodoro Room</h1>
            <div id="coins-display">
                🪙 <span id="coins-count">0</span>
            </div>
        </header>

        <!-- CANVAS (132×164 scaled 4x = 528×656) -->
        <canvas id="game-canvas" width="528" height="656">
            Seu navegador não suporta Canvas.
        </canvas>

        <!-- D-PAD -->
        <div id="dpad">
            <button id="dpad-up" class="dpad-btn" data-dir="up">▲</button>
            <div id="dpad-middle">
                <button id="dpad-left" class="dpad-btn" data-dir="left">◄</button>
                <div id="dpad-center"></div>
                <button id="dpad-right" class="dpad-btn" data-dir="right">►</button>
            </div>
            <button id="dpad-down" class="dpad-btn" data-dir="down">▼</button>
        </div>

        <!-- TIMER POMODORO -->
        <section id="timer-panel">
            <div id="timer-config">
                <label for="work-minutes">⏱️ Foco (min):</label>
                <input type="number" id="work-minutes" min="1" max="120" value="25">
            </div>
            <div id="timer-display">25:00</div>
            <div id="round-display">Rodada: 1 / 4</div>
            <div id="timer-controls">
                <button id="btn-start">▶️ Iniciar</button>
                <button id="btn-pause" disabled>⏸️ Pausar</button>
                <button id="btn-reset">🔄 Resetar</button>
            </div>
            <div id="timer-status">☕ Live</div>
        </section>

        <!-- LOJA -->
        <section id="shop-panel" class="hidden">
            <h2>Loja</h2>
            <div id="shop-items"></div>
        </section>

        <!-- NAVEGAÇÃO -->
        <nav id="game-nav">
            <button id="btn-room" class="active">🏠 Quarto</button>
            <button id="btn-sleep">💤 Dormir</button>
            <button id="btn-shop">🛒 Loja</button>
        </nav>

    </div>

    <script src="js/storage.js" defer></script>
    <script src="js/sound.js" defer></script>
    <script src="js/coins.js" defer></script>
    <script src="js/timer.js" defer></script>
    <script src="js/shop.js" defer></script>
    <script src="js/room.js" defer></script>
    <script src="js/main.js" defer></script>

</body>
</html>
