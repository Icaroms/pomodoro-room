<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Room</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ============================================
         TELA INICIAL
         Aparece ao abrir o jogo. Esconde ao clicar "Jogar".
         ============================================ -->
    <div id="start-screen">
        <div id="start-content">
            <div id="start-icon">🍅</div>
            <h1 id="start-title">Pomodoro<br>Room</h1>
            <p id="start-subtitle">Foque. Ganhe. Decore.</p>
            <div id="start-instructions">
                <span>🎮 WASD ou Setas para mover</span>
                <span>🖱️ Arraste para mover móveis</span>
                <span>🍅 Complete pomodoros e ganhe moedas</span>
                <span>🛋️ Decore seu quarto na loja</span>
            </div>
            <button id="btn-play">Jogar</button>
            <p id="start-version">v1.0</p>
        </div>
    </div>

    <div id="game-container" class="hidden">

        <!-- HEADER -->
        <header id="game-header">
            <h1>Pomodoro Room</h1>
            <div id="coins-display">
                🪙 <span id="coins-count">0</span>
            </div>
        </header>

        <!-- CANVAS -->
        <canvas id="game-canvas" width="600" height="600">
            Seu navegador não suporta Canvas.
        </canvas>

        <!-- TIMER POMODORO -->
        <section id="timer-panel">

            <!-- Configuração do tempo (aparece quando não está rodando) -->
            <div id="timer-config">
                <label for="work-minutes">Foco (min):</label>
                <input type="number" id="work-minutes" min="1" max="120" value="25">
            </div>

            <!-- Display do tempo -->
            <div id="timer-display">25:00</div>

            <!-- Rodada atual -->
            <div id="round-display">Rodada: 1 / 4</div>

            <!-- Botões -->
            <div id="timer-controls">
                <button id="btn-start">Iniciar</button>
                <button id="btn-pause" disabled>Pausar</button>
                <button id="btn-reset">Resetar</button>
            </div>

            <!-- Status: Live / Focado / Descansando -->
            <div id="timer-status">☕ Live</div>
        </section>

        <!-- LOJA -->
        <section id="shop-panel" class="hidden">
            <h2>Loja</h2>
            <div id="shop-items"></div>
        </section>

        <!-- NAVEGAÇÃO -->
        <nav id="game-nav">
            <button id="btn-room" class="active">Quarto</button>
            <button id="btn-shop">Loja</button>
        </nav>

    </div>

    <script src="js/storage.js" defer></script>
    <script src="js/coins.js" defer></script>
    <script src="js/timer.js" defer></script>
    <script src="js/shop.js" defer></script>
    <script src="js/room.js" defer></script>
    <script src="js/main.js" defer></script>

</body>
</html>
